<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BA Chatbot — Business Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2e;
    --border: #2a2a40;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #7070a0;
    --success: #4ade80;
    --error: #f87171;
    --r: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 820px; margin: 0 auto; padding: 0 16px; }

  /* ── Header ── */
  header { padding: 28px 0 18px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); }
  .logo { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
  .brand h1 { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
  .brand p { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  /* ── Progress ── */
  .progress-wrap { padding: 14px 0 10px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--muted); margin-bottom: 7px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  /* ── Chat ── */
  .chat { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .msg.bot { align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .avatar { width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: grid; place-items: center; font-size: 15px; flex-shrink: 0; }
  .msg.bot .avatar { background: var(--accent); border-color: var(--accent); }

  .bubble { max-width: 78%; padding: 12px 16px; border-radius: var(--r); font-size: 0.82rem; line-height: 1.65; }
  .msg.bot .bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 3px; }
  .msg.user .bubble { background: var(--accent); color: #fff; border-top-right-radius: 3px; }

  .hint { font-size: 0.68rem; color: var(--muted); margin-top: 6px; font-style: italic; }
  .err-msg { font-size: 0.72rem; color: var(--error); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
  .err-msg::before { content: '⚠'; }

  /* ── Typing indicator ── */
  .typing .bubble { padding: 14px 18px; }
  .dots { display: flex; gap: 5px; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity:.2; } 40% { opacity:1; } }

  /* ── Input ── */
  .input-area { padding: 14px 0 20px; border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem;
    padding: 12px 14px; resize: none; min-height: 46px; max-height: 120px; line-height: 1.5;
    transition: border-color 0.2s;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  textarea:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn {
    width: 46px; height: 46px; background: var(--accent); border: none; border-radius: var(--r);
    color: #fff; font-size: 18px; cursor: pointer; display: grid; place-items: center;
    transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { background: #7c74ff; }
  .send-btn:active:not(:disabled) { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Analysis result ── */
  .analysis-card {
    background: var(--surface); border: 1px solid var(--accent); border-radius: var(--r);
    padding: 20px; font-size: 0.8rem; line-height: 1.7; animation: fadeUp 0.4s ease;
  }
  .analysis-card h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  .analysis-card h2.main { font-size: 1.1rem; color: var(--text); margin-bottom: 4px; }
  .analysis-card .meta { font-size: 0.65rem; color: var(--muted); margin-bottom: 16px; }
  .analysis-content h2 { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--accent2); margin: 14px 0 5px; }
  .analysis-content ul { padding-left: 18px; }
  .analysis-content li { margin-bottom: 4px; }
  .analysis-content p { margin-bottom: 6px; }
  .restart-btn {
    margin-top: 16px; background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 8px 16px;
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .restart-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Rate limit banner ── */
  .rate-banner { font-size: 0.7rem; color: var(--error); text-align: center; padding: 4px; }

  /* Markdown-lite rendering */
  strong { font-weight: 600; color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">📊</div>
    <div class="brand">
      <h1>Business Analyst AI</h1>
      <p>Powered by Claude Haiku · Hackathon Edition</p>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-label">Getting started…</span>
      <span id="prog-frac">0 / 8</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div id="rate-banner" class="rate-banner" style="display:none"></div>
    <div class="input-row">
      <textarea id="input" placeholder="Type your answer…" rows="1" disabled></textarea>
      <button class="send-btn" id="send-btn" disabled title="Send">➤</button>
    </div>
  </div>
</div>

<script>
// ─── Config ─────────────────────────────────────────────────────────────────
const API_BASE = "http://localhost:8000";  // Change to your deployed backend URL
const MAX_RETRIES = 3;
const RATE_MS = 1500;  // min ms between sends

const QUESTIONS = [
  { id: 0, text: "What is your business name or the product/service you're analyzing?", hint: "e.g. 'Acme Corp' or 'My SaaS product'" },
  { id: 1, text: "What industry or sector does your business operate in?", hint: "e.g. 'FinTech', 'Healthcare', 'E-commerce'" },
  { id: 2, text: "Who is your target customer? Describe them briefly.", hint: "e.g. 'SMB owners aged 30-50 in the US'" },
  { id: 3, text: "What is the core problem your product or service solves?", hint: "Be specific — what pain point does it address?" },
  { id: 4, text: "Who are your main competitors and what makes you different?", hint: "e.g. 'Salesforce, but we're cheaper and easier to use'" },
  { id: 5, text: "What is your current revenue model or monetization strategy?", hint: "e.g. 'Subscription at $49/mo', 'Marketplace commission'" },
  { id: 6, text: "What is your biggest current challenge or bottleneck?", hint: "e.g. 'Customer acquisition', 'Churn', 'Technical debt'" },
  { id: 7, text: "What does success look like for you in the next 12 months?", hint: "e.g. '$1M ARR', '10k users', 'Launch in 3 new markets'" },
];

// ─── State ───────────────────────────────────────────────────────────────────
let state = { step: 0, retries: 0, answers: {}, lastSent: 0, busy: false };

// ─── DOM refs ────────────────────────────────────────────────────────────────
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send-btn");
const progFill = document.getElementById("prog-fill");
const progLabel = document.getElementById("prog-label");
const progFrac = document.getElementById("prog-frac");
const rateBanner = document.getElementById("rate-banner");

// ─── Helpers ─────────────────────────────────────────────────────────────────
function setUI(enabled) {
  input.disabled = !enabled;
  sendBtn.disabled = !enabled;
  if (enabled) input.focus();
}

function updateProgress() {
  const pct = Math.round((state.step / QUESTIONS.length) * 100);
  progFill.style.width = pct + "%";
  progFrac.textContent = `${state.step} / ${QUESTIONS.length}`;
  progLabel.textContent = state.step === QUESTIONS.length
    ? "Analysis complete ✓"
    : `Question ${state.step + 1} of ${QUESTIONS.length}`;
}

function appendMsg(role, html, extra = "") {
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  wrap.innerHTML = `<div class="avatar">${role === "bot" ? "🤖" : "🧑"}</div>
    <div><div class="bubble">${html}</div>${extra}</div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

function showTyping() {
  const el = appendMsg("bot typing", `<div class="dots"><span></span><span></span><span></span></div>`);
  return () => el.remove();
}

function renderMarkdown(text) {
  return text
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/gs, s => `<ul>${s}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<)(.+)$/gm, '<p>$1</p>');
}

// ─── Local validation (mirrors backend, no API call needed) ──────────────────
const GREETINGS = new Set(["hi","hello","hey","ok","okay","yes","no","sure","thanks","thank you","idk","hmm"]);
const MIN_WORDS = [1,1,3,4,3,3,3,3];

function localValidate(qid, answer) {
  const ans = answer.trim();
  if (!ans) return { valid: false, reason: "Please provide an answer — don't leave this blank." };
  if (ans.length > 500) return { valid: false, reason: "Too long! Keep it under 500 characters." };
  if (/^[^a-zA-Z]*$/.test(ans) || /(.)\1{4,}/.test(ans))
    return { valid: false, reason: "That doesn't look like a valid answer. Try describing it in words." };
  const words = ans.toLowerCase().split(/\s+/);
  if (words.length === 1 && GREETINGS.has(words[0]))
    return { valid: false, reason: "That looks like a greeting. Please answer the question." };
  const min = MIN_WORDS[qid] ?? 2;
  if (words.length < min)
    return { valid: false, reason: `Too brief! Please use at least ${min} words.` };
  return { valid: true, reason: "" };
}

// ─── Ask a question ───────────────────────────────────────────────────────────
function askQuestion(q, isRetry = false) {
  const prefix = isRetry
    ? `<em style="color:var(--muted)">Let me rephrase — </em>`
    : "";
  const hint = `<div class="hint">💡 ${q.hint}</div>`;
  appendMsg("bot", prefix + q.text, hint);
  setUI(true);
  updateProgress();
}

// ─── Send answer ─────────────────────────────────────────────────────────────
async function sendAnswer() {
  const ans = input.value.trim();
  if (!ans || state.busy) return;

  // Client-side rate limit
  const now = Date.now();
  if (now - state.lastSent < RATE_MS) {
    showRateBanner(`Please wait ${((RATE_MS - (now - state.lastSent)) / 1000).toFixed(1)}s…`);
    return;
  }
  state.lastSent = now;
  hideRateBanner();

  const q = QUESTIONS[state.step];

  // Local validation first (zero API tokens)
  const localResult = localValidate(q.id, ans);
  if (!localResult.valid) {
    showError(localResult.reason);
    return;
  }

  // Show user bubble
  appendMsg("user", escHtml(ans));
  input.value = "";
  setUI(false);
  state.busy = true;

  // Try server validation
  let valid = true;
  let reason = "";
  try {
    const res = await fetch(`${API_BASE}/validate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question_id: q.id, question: q.text, answer: ans }),
    });
    if (res.status === 429) {
      showRateBanner("Rate limit hit. Please slow down.");
      state.busy = false;
      setUI(true);
      return;
    }
    const data = await res.json();
    valid = data.valid;
    reason = data.reason;
  } catch {
    // Backend unreachable — trust local validation
    valid = true;
  }

  if (!valid) {
    state.retries++;
    const errEl = document.createElement("div");
    errEl.className = "err-msg";
    errEl.textContent = reason;
    chat.lastElementChild?.querySelector(".bubble")?.after(errEl);
    chat.scrollTop = chat.scrollHeight;

    if (state.retries >= MAX_RETRIES) {
      appendMsg("bot", `No worries — I'll move on. Let's continue.`);
      state.answers[q.id] = ans; // accept anyway
      state.retries = 0;
      state.step++;
      state.busy = false;
      nextStep();
    } else {
      appendMsg("bot", `${reason} <em style="color:var(--muted)">(attempt ${state.retries}/${MAX_RETRIES})</em>`);
      state.busy = false;
      setUI(true);
    }
    return;
  }

  // Valid answer
  state.answers[q.id] = ans;
  state.retries = 0;
  state.step++;
  state.busy = false;
  nextStep();
}

// ─── Flow control ─────────────────────────────────────────────────────────────
function nextStep() {
  if (state.step < QUESTIONS.length) {
    setTimeout(() => askQuestion(QUESTIONS[state.step]), 300);
  } else {
    updateProgress();
    setTimeout(runAnalysis, 400);
  }
}

async function runAnalysis() {
  setUI(false);
  const removeTyping = showTyping();
  try {
    const res = await fetch(`${API_BASE}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ answers: state.answers }),
    });
    const data = await res.json();
    removeTyping();
    showAnalysis(data.analysis, data.tokens_used);
  } catch {
    removeTyping();
    showAnalysis(buildFallback(), 0);
  }
}

function showAnalysis(markdown, tokens) {
  const card = document.createElement("div");
  card.className = "analysis-card";
  card.innerHTML = `
    <h2 class="main">📋 Your Business Analysis</h2>
    <div class="meta">Generated by Claude Haiku · ${tokens ? tokens + " tokens used" : "Offline fallback"}</div>
    <div class="analysis-content">${renderMarkdown(markdown)}</div>
    <button class="restart-btn" onclick="restart()">↺ Start over</button>`;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;
}

function buildFallback() {
  const a = state.answers;
  return `## Business Overview\n${a[0]||'Your business'} operates in the ${a[1]||'specified'} industry, targeting ${a[2]||'identified customers'}.\n\n## Key Strengths\n- Clear problem focus: ${a[3]||'N/A'}\n- Differentiation: ${a[4]||'N/A'}\n- Revenue model: ${a[5]||'N/A'}\n\n## Critical Risks\n- ${a[6]||'Key challenge not specified'}\n- Execution risk toward goal: ${a[7]||'Not specified'}\n\n## 90-Day Action Plan\n1. Address: ${a[6]||'your primary challenge'}\n2. Reinforce your differentiator vs ${a[4]||'competitors'}\n3. Track toward: ${a[7]||'your 12-month goal'}`;
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showError(msg) {
  const prev = document.querySelector(".inline-err");
  if (prev) prev.remove();
  const el = document.createElement("div");
  el.className = "err-msg inline-err";
  el.style.padding = "4px 0";
  el.textContent = msg;
  document.querySelector(".input-area").prepend(el);
  setTimeout(() => el.remove(), 4000);
}
function showRateBanner(msg) {
  rateBanner.textContent = msg;
  rateBanner.style.display = "block";
}
function hideRateBanner() { rateBanner.style.display = "none"; }

function restart() {
  state = { step: 0, retries: 0, answers: {}, lastSent: 0, busy: false };
  chat.innerHTML = "";
  updateProgress();
  setTimeout(() => {
    appendMsg("bot", "Welcome back! Let's run a fresh analysis.");
    setTimeout(() => askQuestion(QUESTIONS[0]), 500);
  }, 100);
}

// ─── Keyboard shortcut ────────────────────────────────────────────────────────
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendAnswer(); }
  // auto-resize
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
});
sendBtn.addEventListener("click", sendAnswer);

// ─── Init ─────────────────────────────────────────────────────────────────────
updateProgress();
appendMsg("bot", "Hi! I'm your <strong>Business Analyst AI</strong>. I'll ask you 8 quick questions and generate a strategic analysis. Let's go!");
setTimeout(() => askQuestion(QUESTIONS[0]), 700);
</script>
</body>
</html>
